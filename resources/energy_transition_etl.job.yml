# 3-task DAG: bronze -> silver -> gold. Each task is a notebook.
# Serverless by default; swap to existing_cluster_id / job_clusters if you
# prefer a classic cluster.
resources:
  jobs:
    energy_transition_etl:
      name: "[${bundle.target}] energy_transition_etl"
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ../notebooks/01_bronze.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              secret_scope: ${var.secret_scope}

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ../notebooks/02_silver.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ../notebooks/03_gold.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

      queue:
        enabled: true
